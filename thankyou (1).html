<style>
  :root{
    --blue:#2440FF;
    --lime:#D8FF3E;
    --ink:#0B0B14;
    --paper:#F3F4EE;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;

  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--blue);
    background-image:radial-gradient(rgba(255,255,255,0.12) 1.4px, transparent 1.4px);

    color:#fff;
    font-family:var(--font-body);
    padding:32px;
  }
  .card{
    background:var(--paper);
    color:var(--ink);
    border:2px solid var(--ink);
    border-radius:14px;
    box-shadow:9px 9px 0 var(--ink);
    max-width:560px;
    width:100%;
    padding:52px 44px;
    text-align:center;
  }
  .badge{
    width:64px; height:64px;
    border-radius:50%;
    background:var(--lime);
    border:2px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 26px;
  }
  .badge svg{ width:30px; height:30px; }
  .eyebrow{
    font-family:var(--font-mono);
    text-transform:uppercase;
    letter-spacing:0.16em;
    font-size:0.72rem;
    font-weight:600;
    color:var(--blue);
    margin:0 0 12px 0;
  }
  h1{
    font-family:var(--font-display);
    font-size:clamp(1.7rem,5vw,2.3rem);
    line-height:1.15;
    margin:0 0 16px 0;
  }
  p{
    font-size:1.02rem;
    line-height:1.65;
    color:rgba(11,11,20,0.78);
    margin:0 0 30px 0;
  }
  .actions{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
    margin-bottom:24px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:9px;
    font-family:var(--font-mono);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.04em;
    font-size:0.82rem;
    text-decoration:none;
    padding:15px 24px;
    border-radius:6px;
    border:2px solid var(--ink);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn svg{ width:17px; height:17px; }
  .btn-lime{ background:var(--lime); color:var(--ink); box-shadow:5px 5px 0 var(--ink); }
  .btn-lime:hover{ transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--ink); }
  .btn-outline{ background:transparent; color:var(--ink); box-shadow:5px 5px 0 var(--blue); }
  .btn-outline:hover{ transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--blue); }
  .back-link{
    font-family:var(--font-mono);
    font-size:0.78rem;
    text-decoration:underline;
    color:rgba(11,11,20,0.6);
  }
  @media (max-width:480px){ .card{ padding:38px 26px; } }
